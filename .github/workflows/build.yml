name: Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.11f1
          targetPlatform: WebGL
          allowDirtyBuild: true

      - name: Upload Unity logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Unity-logs
          path: |
            /home/runner/work/_temp/_github_home/.config/unity3d/**/*.log
            /home/runner/work/_temp/_github_home/.local/share/unity3d/**/*.log
            build/**/*.log

      - name: Upload build
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Build-WebGL
          path: build
